; PlatformIO Project Configuration File
;
; XIAO ESP32-S3 + Seeed 7.5" e-paper kit.
; Non-secret build flags live in [common] so platformio_secrets.ini can
; override the WIFI/TOKEN values without losing the rest. A token is
; generated from /dashboard/device on the server.

[platformio]
extra_configs =
    platformio_secrets.ini

[common]
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DBOARD_SCREEN_COMBO=502
    -Isrc
    -DSERVER_URL=\"https://trmnlreaderserver.onrender.com\"
    -DREADER_PREFETCH_PAGES=5
    -DREADER_KEEPALIVE_MS=600000
    -DREADER_LONG_PRESS_MS=600

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
board_build.psram_type = opi
build_flags =
    ${common.build_flags}
    ; Placeholders — overridden in platformio_secrets.ini.
    -DWIFI_SSID=\"your-ssid\"
    -DWIFI_PASS=\"your-pass\"
    -DDEVICE_TOKEN=\"paste-from-dashboard\"
lib_deps =
    https://github.com/Seeed-Studio/Seeed_GFX
    bblanchon/ArduinoJson@^7.1.0
