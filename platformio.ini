; PlatformIO Project Configuration File
;
; XIAO ESP32-S3 + Seeed 7.5" e-paper kit.
; The four "secret" build flags below (SSID, password, server URL, device
; token) can be overridden in platformio_secrets.ini (gitignored) or by
; passing -D on the CLI — e.g. `pio run -DDEVICE_TOKEN=\"trmnl_abc...\"`.
; A token is generated from /dashboard/device on the server.

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
board_build.psram_type = opi
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DBOARD_SCREEN_COMBO=502
    -Isrc
    ; ---- override these in platformio_secrets.ini ----
    -DWIFI_SSID=\"your-ssid\"
    -DWIFI_PASS=\"your-pass\"
    -DSERVER_URL=\"https://trmnlreaderserver.onrender.com\"
    -DDEVICE_TOKEN=\"paste-from-dashboard\"
    ; ---- tunables ----
    -DREADER_PREFETCH_PAGES=5
    -DREADER_KEEPALIVE_MS=600000
    -DREADER_LONG_PRESS_MS=600
lib_deps =
    https://github.com/Seeed-Studio/Seeed_GFX
    bblanchon/ArduinoJson@^7.1.0
extra_configs =
    platformio_secrets.ini
